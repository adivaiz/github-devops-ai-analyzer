name: DevOps Pipeline

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download the repository code into the runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Install Python so the workflow can run the project
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3: Install all required Python libraries from requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 4: Simple validation step to make sure the pipeline runs successfully
      - name: Run basic check
        run: echo "Pipeline is running successfully"
